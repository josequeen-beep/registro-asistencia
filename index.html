<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AutoEscuela Chile - Simulador CONASET Clase B</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; --sub: #64748b; --muted: #94a3b8;
  --border: #e2e8f0; --accent: #f59e0b; --accent2: #1e293b; --ok: #059669; --bad: #dc2626;
  --radius: 14px; --font: 'Outfit', sans-serif; --mono: 'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
button { cursor: pointer; font-family: var(--font); border: none; outline: none; }
button:disabled { opacity: .45; cursor: not-allowed; }
input { font-family: var(--font); outline: none; }
.app { max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; }

/* Animations */
@keyframes fadeIn { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:translateY(0) } }
@keyframes slideUp { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:translateY(0) } }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
@keyframes spin { to { transform:rotate(360deg) } }
.fade-in { animation: fadeIn .4s ease both; }
.slide-up { animation: slideUp .4s ease both; }

/* LOGIN */
.login-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
.login-box { width:100%; max-width:360px; background:var(--card); border-radius:20px; padding:32px 24px; box-shadow:0 8px 40px rgba(0,0,0,.08); }
.login-logo { text-align:center; margin-bottom:20px; }
.login-logo svg { width:56px; height:56px; }
.login-title { font-size:1.3rem; font-weight:800; text-align:center; margin-bottom:4px; }
.login-sub { font-size:.78rem; color:var(--sub); text-align:center; margin-bottom:24px; }
.form-group { margin-bottom:16px; }
.form-label { display:block; font-size:.75rem; font-weight:600; color:var(--sub); margin-bottom:5px; text-transform:uppercase; letter-spacing:.04em; }
.form-input { width:100%; padding:12px 14px; border:2px solid var(--border); border-radius:10px; font-size:.9rem; transition:border-color .2s; background:var(--bg); }
.form-input:focus { border-color:var(--accent); }
.login-btn { width:100%; padding:14px; border-radius:12px; background:linear-gradient(135deg,var(--accent2),#334155); color:#fff; font-size:.9rem; font-weight:700; margin-top:8px; transition:transform .1s; }
.login-btn:active { transform:scale(.97); }
.login-error { font-size:.78rem; color:var(--bad); text-align:center; margin-top:10px; }

/* HEADER */
.top-bar { display:flex; align-items:center; gap:10px; padding:12px 16px; background:var(--card); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
.back-btn { background:none; font-size:1.2rem; color:var(--sub); padding:4px 8px; border-radius:8px; }
.top-title { font-size:.95rem; font-weight:700; flex:1; }
.avatar-btn { width:32px; height:32px; border-radius:50%; background:var(--accent); color:var(--accent2); font-size:.75rem; font-weight:800; display:flex; align-items:center; justify-content:center; }

/* HOME HEADER */
.home-header { display:flex; align-items:center; gap:12px; padding:16px 16px 0; }
.brand-title { font-size:1.15rem; font-weight:800; letter-spacing:-.02em; }
.brand-sub { font-size:.68rem; color:var(--muted); font-weight:500; }

/* PROGRESS CARD */
.prog-card { margin:14px 16px 0; padding:18px; border-radius:18px; background:linear-gradient(135deg,#0f172a,#1e293b); color:#fff; }
.prog-top { display:flex; justify-content:space-between; align-items:center; }
.prog-label { font-size:.7rem; color:var(--muted); }
.prog-pct { font-size:2rem; font-weight:800; color:var(--accent); font-family:var(--mono); }
.prog-stats { display:flex; gap:16px; margin-top:14px; padding-top:14px; border-top:1px solid #334155; }
.prog-stat { display:flex; flex-direction:column; align-items:center; flex:1; }
.stat-num { font-size:1.05rem; font-weight:700; font-family:var(--mono); }
.stat-label { font-size:.62rem; color:var(--muted); margin-top:2px; }
.prog-bar-outer { height:6px; border-radius:3px; background:#334155; margin-top:14px; overflow:hidden; }
.prog-bar-inner { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--accent),#eab308); transition:width .6s ease; }
.prog-msg { font-size:.68rem; color:var(--muted); text-align:center; margin-top:8px; }

/* WEAK ALERT */
.weak-box { margin:12px 16px 0; padding:12px; border-radius:12px; background:#fffbeb; border:1px solid #fde68a; }
.weak-title { font-size:.8rem; font-weight:700; margin-bottom:6px; }
.weak-chips { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:8px; }
.weak-chip { font-size:.67rem; font-weight:600; padding:3px 8px; border-radius:6px; border:1.5px solid; background:#fff; }
.refuerzo-btn { width:100%; padding:9px; border-radius:8px; background:var(--accent); color:var(--accent2); font-size:.78rem; font-weight:700; }

/* ACTIONS */
.actions { display:flex; flex-direction:column; gap:10px; margin:16px 16px 0; }
.action-btn { display:flex; align-items:center; gap:12px; padding:14px 16px; border:1.5px solid var(--border); border-radius:var(--radius); background:var(--card); text-align:left; width:100%; transition:all .15s; }
.action-btn.dark { background:linear-gradient(135deg,#0f172a,#1e293b); color:#fff; border:none; box-shadow:0 4px 20px rgba(15,23,42,.2); }
.action-icon { font-size:1.4rem; }
.action-label { font-size:.88rem; font-weight:700; }
.action-desc { font-size:.7rem; color:var(--muted); margin-top:1px; }
.action-arrow { margin-left:auto; font-size:1.1rem; color:var(--muted); }

/* INFO BAR */
.info-bar { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:16px 16px 0; }
.info-item { text-align:center; padding:10px 4px; background:var(--card); border-radius:10px; border:1px solid var(--border); font-size:.62rem; color:var(--muted); }
.info-num { display:block; font-size:1.1rem; font-weight:700; color:var(--accent); font-family:var(--mono); }

/* TEMARIOS */
.tem-list { padding:8px 16px 30px; }
.tem-card { display:flex; align-items:center; gap:12px; width:100%; padding:14px; border:1.5px solid var(--border); border-radius:var(--radius); background:var(--card); text-align:left; margin-bottom:10px; }
.tem-icon { width:52px; height:52px; border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; }
.tem-title { font-size:.85rem; font-weight:700; }
.tem-desc { font-size:.7rem; color:var(--muted); margin-top:2px; line-height:1.4; }
.tem-studied { font-size:.67rem; background:#f0fdf4; color:var(--ok); border-radius:4px; padding:1px 6px; font-weight:700; margin-left:6px; }
.tem-errors { font-size:.63rem; color:var(--bad); font-weight:600; margin-top:3px; display:inline-block; }
.tem-arrow { font-size:1.3rem; color:#cbd5e1; flex-shrink:0; margin-left:auto; }

/* TEMARIO DETALLE */
.tem-hero { margin:0 16px; padding:22px; border-radius:16px; text-align:center; }
.tem-hero svg, .tem-hero img { max-width:80px; height:auto; }
.tem-section { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin:0 16px 12px; }
.tem-sec-title { font-size:.88rem; font-weight:700; margin-bottom:8px; }
.tem-sec-text { font-size:.8rem; color:#475569; line-height:1.65; }
.tem-sec-illust { display:flex; justify-content:center; margin:8px 0; }
.tem-actions { padding:12px 16px 30px; display:flex; flex-direction:column; gap:8px; }
.tem-test-btn { padding:13px; border-radius:12px; color:#fff; font-size:.85rem; font-weight:700; }
.tem-mark-btn { padding:11px; border:2px solid var(--border); border-radius:12px; background:var(--card); font-size:.82rem; font-weight:600; color:#475569; }

/* EXAMEN */
.exam-top { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; background:var(--card); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
.exam-label { font-size:.8rem; font-weight:600; color:var(--sub); }
.timer-badge { padding:5px 12px; border-radius:20px; background:var(--bg); font-size:.8rem; font-weight:600; font-family:var(--mono); color:#334155; }
.timer-badge.low { background:#fef2f2; color:var(--bad); animation:pulse 1s ease infinite; }
.prog-wrap { height:4px; background:var(--border); margin:0 16px; }
.prog-fill { height:100%; border-radius:2px; background:linear-gradient(90deg,var(--accent),#eab308); transition:width .4s; }
.prog-text { font-size:.66rem; color:var(--muted); text-align:right; padding:3px 16px 0; }
.dots-toggle { display:block; width:100%; background:none; border-bottom:1px solid var(--border); color:var(--sub); font-size:.7rem; padding:5px 16px; text-align:center; }
.dots-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; padding:8px 16px; background:var(--card); border-bottom:1px solid var(--border); }
.dot { aspect-ratio:1; border-radius:7px; border:1.5px solid var(--border); font-size:.63rem; font-weight:600; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; line-height:1; background:var(--card); color:var(--muted); }
.dot.current { border-color:var(--accent); background:#fffbeb; color:#b45309; box-shadow:0 0 0 2px rgba(245,158,11,.2); }
.dot.ok { background:#f0fdf4; border-color:var(--ok); color:var(--ok); }
.dot.bad { background:#fef2f2; border-color:var(--bad); color:var(--bad); }
.dot.answered { background:var(--bg); border-color:var(--muted); color:#475569; }
.dot-x2 { position:absolute; top:-3px; right:-3px; font-size:.43rem; background:var(--bad); color:#fff; border-radius:3px; padding:1px 2px; font-weight:700; }

/* QUESTION */
.q-box { padding:16px; }
.q-meta { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
.q-tema { font-size:.66rem; font-weight:600; padding:3px 8px; border-radius:5px; }
.q-doble { font-size:.66rem; font-weight:700; padding:3px 8px; border-radius:5px; background:linear-gradient(135deg,#dc2626,#ef4444); color:#fff; }
.q-illust { display:flex; justify-content:center; margin:8px 0 12px; }
.q-illust svg { max-height: 120px; width: auto; }
.q-num { font-size:.7rem; color:var(--muted); margin-bottom:4px; }
.q-text { font-size:.95rem; font-weight:600; line-height:1.5; margin-bottom:16px; }
.change-hint { font-size:.65rem; color:var(--accent); text-align:center; margin-top:8px; opacity:.8; }
.opts { display:flex; flex-direction:column; gap:8px; }
.opt { display:flex; align-items:flex-start; gap:10px; padding:12px 14px; border:2px solid var(--border); border-radius:11px; background:var(--card); text-align:left; width:100%; font-size:.83rem; line-height:1.4; color:#334155; transition:all .15s; }
.opt.sel { border-color:var(--accent); background:#fffbeb; }
.opt.ok { border-color:var(--ok); background:#f0fdf4; }
.opt.bad { border-color:var(--bad); background:#fef2f2; }
.opt-letter { min-width:26px; height:26px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:.73rem; font-weight:700; background:var(--bg); color:var(--sub); flex-shrink:0; }
.opt.sel .opt-letter { background:var(--accent); color:#fff; }
.opt.ok .opt-letter { background:var(--ok); color:#fff; }
.opt.bad .opt-letter { background:var(--bad); color:#fff; }
.expl-box { margin-top:16px; padding:14px; border-radius:11px; border:1px solid; }
.expl-box.correct { background:#f0fdf4; border-color:#bbf7d0; }
.expl-box.wrong { background:#fef2f2; border-color:#fecaca; }
.expl-head { font-size:.83rem; font-weight:700; margin-bottom:6px; }
.expl-text { font-size:.78rem; color:#334155; line-height:1.6; }

/* NAV */
.nav-row { display:flex; gap:8px; padding:14px 16px; }
.nav-btn { flex:1; padding:11px; border:2px solid var(--border); border-radius:11px; background:var(--card); font-size:.8rem; font-weight:600; color:var(--sub); }
.nav-btn.next { background:var(--accent2); color:#fff; border:none; }
.nav-btn.finish { background:linear-gradient(135deg,var(--accent),#eab308); color:var(--accent2); border:none; font-weight:700; }

/* RESULTADO */
.res-banner { text-align:center; padding:30px 20px; border-radius:0 0 20px 20px; color:#fff; }
.res-banner.pass { background:linear-gradient(135deg,#059669,#10b981); }
.res-banner.fail { background:linear-gradient(135deg,#dc2626,#ef4444); }
.res-title { font-size:1.5rem; font-weight:800; letter-spacing:-.02em; }
.res-sub { font-size:.82rem; opacity:.9; margin-top:4px; }
.res-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:14px 16px 0; }
.res-card { text-align:center; padding:12px 6px; background:var(--card); border-radius:12px; border:1px solid var(--border); }
.res-num { font-size:1.2rem; font-weight:800; font-family:var(--mono); }
.res-label { font-size:.68rem; font-weight:600; color:var(--sub); margin-top:2px; }
.res-temas { margin:14px 16px 0; background:var(--card); border-radius:var(--radius); border:1px solid var(--border); padding:16px; }
.res-tema-row { margin-bottom:12px; }
.res-tema-header { display:flex; justify-content:space-between; margin-bottom:3px; }
.res-tema-name { font-size:.76rem; font-weight:600; }
.res-tema-score { font-size:.76rem; font-weight:600; font-family:var(--mono); }
.res-tema-bar { height:5px; border-radius:3px; background:var(--bg); overflow:hidden; }
.res-tema-fill { height:100%; border-radius:3px; transition:width .6s; }
.res-actions { display:flex; gap:8px; padding:16px; }
.rev-btn { flex:1; padding:12px; border:2px solid var(--border); border-radius:11px; background:var(--card); font-size:.8rem; font-weight:600; color:#475569; }
.new-btn { flex:1; padding:12px; border-radius:11px; background:linear-gradient(135deg,#0f172a,#1e293b); color:#fff; font-size:.8rem; font-weight:600; }

/* REVISION */
.rev-card { background:var(--card); border-radius:13px; border:1px solid var(--border); padding:16px; margin:0 16px 12px; }
.rev-opt { display:flex; gap:8px; align-items:flex-start; padding:6px 8px; border-radius:7px; font-size:.78rem; line-height:1.4; background:var(--bg); margin-bottom:4px; }
.rev-opt.ok { background:#f0fdf4; color:#065f46; font-weight:500; }
.rev-opt.bad { background:#fef2f2; color:#991b1b; text-decoration:line-through; opacity:.8; }
.rev-letter { min-width:20px; height:20px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:.66rem; font-weight:700; flex-shrink:0; }
.rev-expl { font-size:.76rem; color:#475569; line-height:1.6; padding:10px; background:var(--bg); border-radius:7px; border-left:3px solid var(--accent); margin-top:8px; }

/* SETTINGS */
.settings-section { margin:0 16px 16px; background:var(--card); border-radius:var(--radius); border:1px solid var(--border); padding:16px; }
.settings-title { font-size:.88rem; font-weight:700; margin-bottom:12px; }
.user-row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); }
.user-row:last-child { border-bottom:none; }
.user-name { font-size:.82rem; font-weight:600; }
.user-role { font-size:.65rem; color:var(--muted); }
.del-user-btn { font-size:.7rem; color:var(--bad); background:none; font-weight:600; padding:4px 8px; }
.add-user-form { display:flex; gap:6px; margin-top:10px; }
.add-user-form input { flex:1; padding:8px 10px; border:1.5px solid var(--border); border-radius:8px; font-size:.8rem; }
.add-user-btn { padding:8px 14px; border-radius:8px; background:var(--accent2); color:#fff; font-size:.78rem; font-weight:600; white-space:nowrap; }

.disclaimer { font-size:.65rem; color:#cbd5e1; text-align:center; margin:14px 16px 24px; line-height:1.5; }
.logout-btn { display:block; margin:8px auto 20px; background:none; color:var(--muted); font-size:.72rem; text-decoration:underline; }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// AUTOESCUELA CHILE - COMPLETE APP
// ═══════════════════════════════════════════════════════════════════════

// ── SVG ILLUSTRATIONS ────────────────────────────────────────────────
const SVG = {
  logo: `<svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg"><circle cx="25" cy="25" r="23" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/><path d="M15 32 L25 12 L35 32" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><line x1="19" y1="26" x2="31" y2="26" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/><circle cx="25" cy="37" r="2.5" fill="#f59e0b"/></svg>`,
  // ── SEÑALES DE TRÁNSITO (detalladas) ──

  cedaPaso: `<svg viewBox="0 0 120 130" xmlns="http://www.w3.org/2000/svg"><rect x="52" y="95" width="16" height="35" rx="2" fill="#666"/><polygon points="60,95 8,10 112,10" fill="#fff" stroke="#cc0000" stroke-width="6"/><text x="60" y="42" text-anchor="middle" fill="#333" font-size="13" font-weight="bold" font-family="Arial,sans-serif">CEDA EL</text><text x="60" y="60" text-anchor="middle" fill="#333" font-size="13" font-weight="bold" font-family="Arial,sans-serif">PASO</text></svg>`,
  velocidad: `<svg viewBox="0 0 120 130" xmlns="http://www.w3.org/2000/svg"><rect x="52" y="95" width="16" height="35" rx="2" fill="#666"/><circle cx="60" cy="52" r="46" fill="#fff" stroke="#cc0000" stroke-width="7"/><text x="60" y="62" text-anchor="middle" fill="#1e293b" font-size="32" font-weight="bold" font-family="Arial,sans-serif">60</text><text x="60" y="78" text-anchor="middle" fill="#64748b" font-size="9" font-family="Arial,sans-serif">km/h máx</text></svg>`,
  noEntrar: `<svg viewBox="0 0 120 130" xmlns="http://www.w3.org/2000/svg"><rect x="52" y="95" width="16" height="35" rx="2" fill="#666"/><circle cx="60" cy="52" r="46" fill="#cc0000" stroke="#fff" stroke-width="4"/><rect x="22" y="42" width="76" height="20" rx="4" fill="#fff"/></svg>`,
  curva: `<svg viewBox="0 0 120 130" xmlns="http://www.w3.org/2000/svg"><rect x="52" y="95" width="16" height="35" rx="2" fill="#666"/><g transform="translate(60,52)"><rect x="-45" y="-45" width="90" height="90" rx="5" fill="#f7c948" stroke="#333" stroke-width="2.5" transform="rotate(45)"/></g><path d="M38 78 Q38 30 78 30" fill="none" stroke="#333" stroke-width="7" stroke-linecap="round"/><polygon points="78,18 92,30 78,38" fill="#333"/></svg>`,
  peatones: `<svg viewBox="0 0 120 130" xmlns="http://www.w3.org/2000/svg"><rect x="52" y="95" width="16" height="35" rx="2" fill="#666"/><g transform="translate(60,52)"><rect x="-45" y="-45" width="90" height="90" rx="5" fill="#f7c948" stroke="#333" stroke-width="2.5" transform="rotate(45)"/></g><circle cx="60" cy="22" r="8" fill="#333"/><line x1="60" y1="30" x2="60" y2="55" stroke="#333" stroke-width="4.5"/><line x1="60" y1="38" x2="45" y2="50" stroke="#333" stroke-width="3.5"/><line x1="60" y1="38" x2="75" y2="50" stroke="#333" stroke-width="3.5"/><line x1="60" y1="55" x2="45" y2="75" stroke="#333" stroke-width="3.5"/><line x1="60" y1="55" x2="75" y2="75" stroke="#333" stroke-width="3.5"/></svg>`,
  info: `<svg viewBox="0 0 160 100" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="10" width="150" height="70" rx="6" fill="#006b3f" stroke="#fff" stroke-width="3"/><text x="80" y="38" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold" font-family="Arial,sans-serif">Santiago</text><text x="80" y="58" text-anchor="middle" fill="#fff" font-size="13" font-family="Arial,sans-serif">← 120 km</text><line x1="15" y1="68" x2="145" y2="68" stroke="#fff" stroke-width="1" opacity=".4"/><text x="80" y="78" text-anchor="middle" fill="#ccc" font-size="9" font-family="Arial,sans-serif">Ruta 5 Sur</text></svg>`,

function svgHTML(key, size=50) {
  return `<div style="width:${size}px;height:${size}px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center">${SVG[key]||''}</div>`;
}
// Extended version for larger illustrations in temarios and questions
function svgWide(key, width=200) {
  if (!SVG[key]) return '';
  return `<div style="width:100%;max-width:${width}px;margin:0 auto;display:flex;align-items:center;justify-content:center">${SVG[key]}</div>`;
}

// ── STORAGE HELPERS ──────────────────────────────────────────────────
const LS = {
  get(k) { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } },
  set(k,v) { localStorage.setItem(k, JSON.stringify(v)); },
  del(k) { localStorage.removeItem(k); }
};

// ── USER SYSTEM ──────────────────────────────────────────────────────
function getUsers() {
  let u = LS.get('ae_users');
  if (!u || !u.length) {
    u = [{ username:'admin', password:'123456', role:'admin', created: new Date().toISOString() }];
    LS.set('ae_users', u);
  }
  return u;
}
function saveUsers(u) { LS.set('ae_users', u); }
function getSession() { return LS.get('ae_session'); }
function setSession(u) { LS.set('ae_session', u); }
function clearSession() { LS.del('ae_session'); }
function getUserProgress(username) { return LS.get('ae_prog_'+username) || { temasEstudiados:{}, examenes:[], erroresPorTema:{}, preguntasRespondidas:{}, preguntasCorrectas:{} }; }
function saveUserProgress(username, p) { LS.set('ae_prog_'+username, p); }

      {t:"Fatiga y Somnolencia", txt:"La fatiga reduce la atención, aumenta tiempos de reacción y puede provocar 'microsueños' (quedarse dormido 2-5 segundos sin darse cuenta). A 100 km/h, un microsueño de 3 segundos = 83 metros sin control. RECOMENDACIONES: descansar cada 2 horas, no conducir más de 4 horas seguidas, evitar comidas pesadas, mantener buena ventilación."},
      {t:"Medicamentos y Drogas", txt:"Ansiolíticos, antihistamínicos, antidepresivos, relajantes musculares, opioides y otros fármacos pueden producir somnolencia, visión borrosa y alterar reflejos. SIEMPRE consultar al médico si puede conducir. La marihuana, cocaína y otras drogas ilegales alteran gravemente la capacidad de conducción y son sancionadas igual que el alcohol."},
      {t:"💡 Tips para el Examen", txt:"Las preguntas sobre alcohol y drogas son de DOBLE PUNTAJE. Recuerda: 0,3 g/l = bajo la influencia. 0,8 g/l = ebriedad. El alcohol NO mejora nada: no mejora reflejos, no mejora visión, no aumenta concentración. Siempre la respuesta correcta es la que describe efectos NEGATIVOS del alcohol."},
    ]},
  { id:"vulnerables", titulo:"Usuarios Vulnerables", icono:"🚶", color:"#ea580c", desc:"Peatones, ciclistas, motociclistas, niños, adultos mayores y personas con discapacidad", svg:"peatones",
    contenido:[
      {t:"¿Quiénes son los Usuarios Vulnerables?", txt:"Son aquellas personas que por su condición física o el tipo de vehículo que utilizan están más expuestas a sufrir consecuencias graves: peatones, ciclistas, motociclistas, niños, adultos mayores y personas con discapacidad. Representan el 15% de los siniestros pero casi el 40% de las muertes.", svg:"peatones"},
      {t:"Peatones", txt:"Tienen derecho PREFERENTE de paso en cruces demarcados (paso cebra). El conductor debe detenerse completamente. Sus movimientos pueden ser impredecibles. Infracciones comunes: cruzar fuera del paso peatonal y desobedecer semáforos. El conductor debe estar SIEMPRE alerta cerca de pasos peatonales, paraderos de buses y zonas escolares."},
      {t:"Ciclistas", txt:"La Ley de Convivencia Vial (Ley 21.088) establece mínimo 1,5 metros de distancia lateral al adelantar a un ciclista. Se debe respetar ciclovías, zonas de espera adelantada en semáforos y ciclo calles (vías compartidas a máximo 30 km/h). Los ciclistas tienen preferencia al virar a la derecha e izquierda según la nueva señalización."},
      {t:"Motociclistas", txt:"Son usuarios vulnerables porque no tienen la protección de una carrocería. El conductor de auto debe verificar siempre los espejos y puntos ciegos antes de cambiar de pista. Los motociclistas están obligados a usar casco certificado, chaleco reflectante y luces encendidas."},
      {t:"Niños y Adultos Mayores", txt:"NIÑOS: Baja percepción del riesgo, pueden aparecer inesperadamente entre autos, son de menor estatura (difíciles de ver). Reducir velocidad en zonas escolares (30 km/h). ADULTOS MAYORES: Pueden tener movilidad reducida, problemas de audición o visión. Ambos grupos requieren paciencia y precaución extra del conductor."},
      {t:"💡 Tips para el Examen", txt:"Si la pregunta menciona peatón en paso cebra: SIEMPRE detenerse. Si menciona ciclista: SIEMPRE 1,5 metros de distancia. Si menciona zona escolar: SIEMPRE 30 km/h. Nunca la respuesta correcta es 'tocar la bocina' ni 'pasar rápido' cuando hay usuarios vulnerables."},
    ]},
  { id:"normas", titulo:"Normas de Circulación", icono:"📜", color:"#2563eb", desc:"Velocidades máximas, adelantamientos, estacionamiento, virajes, prioridades y autopistas", svg:"velocidad",
    contenido:[
      {t:"Velocidades Máximas", txt:"ZONA URBANA: 60 km/h (livianos y medianos). ZONA RURAL: 100 km/h (livianos), 90 km/h (medianos). AUTOPISTAS: 120 km/h (livianos). ZONAS ESCOLARES/HOSPITALES: 30 km/h. ZONAS 30: 30 km/h. Siempre prevalece la señalización local sobre el límite general.", svg:"velocidad"},
      {t:"Adelantamiento", txt:"Solo donde la señalización y demarcación lo permitan (línea SEGMENTADA). SIEMPRE por la IZQUIERDA. PROHIBIDO adelantar en: intersecciones, curvas, puentes, pasos peatonales, túneles, cuestas con visibilidad reducida y donde haya línea continua. Antes de adelantar: verificar que la pista contraria esté libre y señalizar la maniobra."},
      {t:"Estacionamiento", txt:"PROHIBIDO estacionar: a menos de 10 metros de esquinas y señales PARE/CEDA, en doble fila, sobre aceras, en pasos peatonales, frente a grifos de incendio, en curvas y puentes. Línea AMARILLA CONTINUA en solera = prohibido estacionar y detenerse. Línea AMARILLA SEGMENTADA = prohibido estacionar pero sí detenerse brevemente."},
      {t:"Virajes e Intersecciones", txt:"Señalizar con anticipación mínima de 30 metros en zona urbana. Usar señalizadores (intermitentes). Verificar espejos retrovisores Y punto ciego antes de maniobrar. En intersecciones sin señalización: prioridad al vehículo que viene por la DERECHA. Vehículos de emergencia tienen prioridad ABSOLUTA."},
      {t:"Autopistas y Autovías", txt:"Si se pasa una salida, continuar hasta la SIGUIENTE AUTORIZADA. NUNCA retroceder ni hacer virajes en U. Velocidad mínima establecida por señalización. Usar pista derecha para circular, izquierda para adelantar. No detenerse en la berma salvo emergencia (usar triángulos reflectantes)."},
      {t:"Uso de Luces", txt:"En Chile es OBLIGATORIO circular con luces BAJAS encendidas las 24 HORAS del día, en TODAS las vías del país (Art. 68 Ley de Tránsito, desde 2005). Luces altas: solo en carreteras sin iluminación y deben bajarse al cruzarse con otro vehículo o al seguir a uno. Luces de niebla: solo cuando hay niebla o lluvia intensa."},
      {t:"La Bocina", txt:"Es un elemento de SEGURIDAD que solo debe usarse para PREVENIR un siniestro si es estrictamente necesario (Art. 78). NO debe usarse para: apurar a otros vehículos, saludar, expresar enojo ni avisar que se estacionará. Su uso indebido es una infracción."},
      {t:"💡 Datos Clave para el Examen", txt:"Velocidad urbana = 60 km/h. Estacionar = mínimo 10m de esquinas. Luces bajas = 24 horas SIEMPRE. Autopista: nunca retroceder. Adelantar: solo por izquierda con línea segmentada. Bocina: solo para prevenir siniestros."},
    ]},
  { id:"conduccion", titulo:"Conducción Segura", icono:"🛡️", color:"#0891b2", desc:"Conducción defensiva, efecto túnel, distancias de frenado, condiciones adversas y distracciones", svg:"efectoTunel",
    contenido:[
      {t:"Conducción Defensiva", txt:"Consiste en ANTICIPARSE a las situaciones de riesgo: prever lo que otros pueden hacer mal, mantener distancia segura, estar atento al entorno y tener siempre un plan de escape. Un conductor defensivo NO confía en que los demás respetarán las normas."},
      {t:"Efecto Túnel", txt:"A mayor velocidad, el CAMPO VISUAL LATERAL se reduce progresivamente, como si miraras por un túnel. A 40 km/h = campo visual de 100°. A 70 km/h = 75°. A 100 km/h = 45°. A 130 km/h = solo 30°. Esto significa que a alta velocidad NO ves peatones, ciclistas ni vehículos que se acercan por los costados.", svg:"efectoTunel"},
      {t:"Distancia de Frenado", txt:"La distancia de frenado depende de la VELOCIDAD AL CUADRADO (energía cinética E=½mv²). Al DUPLICAR la velocidad, la distancia de frenado se CUADRUPLICA. Ejemplo: a 50 km/h frenas en 13m, a 100 km/h necesitas 52m (4 veces más). Distancia total de detención = distancia de reacción + distancia de frenado."},
      {t:"Regla de los 3 Segundos", txt:"Para mantener distancia segura de SEGUIMIENTO: elige un punto fijo en la vía, cuando el vehículo de adelante lo pase, cuenta 'mil uno, mil dos, mil tres'. Si llegas antes de terminar, estás muy cerca. Con lluvia o mal pavimento: aumentar a 4-5 segundos. De noche: aumentar a 5-6 segundos."},
      {t:"Zona de Incertidumbre", txt:"Es el espacio alrededor de peatones, ciclistas u otros vehículos donde PODRÍAN realizar movimientos impredecibles. Ejemplos: un peatón que camina por la acera podría bajar a la calzada, un auto estacionado podría abrir la puerta, un niño podría correr entre autos. SIEMPRE ampliar la distancia al pasar cerca de estas zonas."},
      {t:"Conducción bajo Lluvia", txt:"El pavimento mojado REDUCE la adherencia. Riesgo de AQUAPLANING (los neumáticos pierden contacto con el pavimento y flotan sobre el agua). MEDIDAS: reducir velocidad, aumentar distancia de seguimiento, encender luces bajas, evitar frenazos bruscos, no usar cruise control, verificar estado de neumáticos y limpiaparabrisas.", svg:"lluvia"},
      {t:"Conducción Nocturna", txt:"De noche la visibilidad se reduce drásticamente. Se pierde la percepción de colores y profundidad. El encandilamiento de otros vehículos puede cegar temporalmente (2-5 segundos). MEDIDAS: reducir velocidad, aumentar distancia, mantener parabrisas limpio, no mirar directamente las luces que vienen de frente."},
      {t:"Uso del Celular", txt:"PROHIBIDO manipular el celular mientras se conduce (Ley No Más Chat). Solo se permite usar sistema de manos libres. Multa GRAVÍSIMA por infracción (Art. 107). Usar el celular al conducir aumenta en 4 veces el riesgo de siniestro. Enviar un mensaje = 5 segundos sin mirar la vía = 70 metros a ciegas a 50 km/h."},
      {t:"💡 Tips para el Examen", txt:"Efecto túnel = PIERDE campo visual. Duplicar velocidad = CUADRUPLICA frenado. Distancia segura = regla de 3 segundos. Lluvia = reducir velocidad + aumentar distancia + luces. Celular = PROHIBIDO (solo manos libres)."},
    ]},
  { id:"senales", titulo:"Señales de Tránsito", icono:"🚦", color:"#dc2626", desc:"Señales verticales (reglamentarias, preventivas, informativas) y demarcación horizontal", svg:"pare",
    contenido:[
      {t:"Clasificación General", txt:"Las señales verticales se clasifican según su FORMA: Reglamentarias (mayormente circulares), Preventivas (romboidales/diamante) e Informativas (rectangulares). Excepciones importantes: PARE = octógono rojo, CEDA EL PASO = triángulo invertido. Las señales de tránsito son OBLIGATORIAS y desconocerlas no exime de responsabilidad."},
      {t:"Señales Reglamentarias", txt:"Son de cumplimiento OBLIGATORIO. Se dividen en: PRIORIDAD (Pare, Ceda el Paso), PROHIBICIÓN (No entrar, No adelantar, No estacionar, No virar), RESTRICCIÓN (Velocidad máxima, Peso máximo) y OBLIGACIÓN (Dirección obligatoria, Mantener derecha). Generalmente circulares con borde ROJO y fondo BLANCO.", svg:"pare"},
      {t:"Señales Preventivas", txt:"ADVIERTEN sobre peligros o condiciones inusuales en la vía: curvas peligrosas, cruces, peatones, animales, resaltos (lomos de toro), pendientes, angostamientos, cruces ferroviarios, proximidad de túneles. Forma de ROMBO (diamante), fondo AMARILLO con símbolo NEGRO. Se instalan ANTES del peligro para que reduzcas la velocidad.", svg:"curva"},
      {t:"Señales Informativas", txt:"Guían al conductor con información sobre rutas, distancias, servicios, destinos y puntos de interés. Forma RECTANGULAR, generalmente fondo VERDE con texto BLANCO. Incluyen: preseñalización, dirección, confirmación, identificación vial y localización. También hay informativas de servicios (hospital, estación de servicio, teléfono de emergencia).", svg:"info"},
      {t:"Semáforos", txt:"LUZ VERDE: puede avanzar si hay espacio al otro lado (no bloquear cruce). LUZ AMARILLA: detenerse si puede hacerlo con seguridad, si ya cruzó la línea de detención puede continuar. LUZ ROJA: detenerse obligatoriamente. FLECHA VERDE: permite girar en la dirección indicada. Algunos semáforos tienen CUENTA REGRESIVA para peatones."},
      {t:"Demarcación Horizontal", txt:"Línea CONTINUA: prohibido cruzar o cambiar de pista. Línea SEGMENTADA: permitido cruzar/adelantar. Línea AMARILLA en solera: prohibido estacionar. DOBLE línea continua: prohibido adelantar en ambos sentidos. PASO CEBRA: preferencia peatonal. Líneas de DETENCIÓN: donde debes parar en semáforo o PARE."},
      {t:"Nuevas Señales (2021+)", txt:"Con la Ley de Convivencia Vial se incorporaron 16 nuevas señales: Zonas 30, Preferencia ciclista al virar, Zonas de espera adelantada para motos y bicicletas, Ciclo calles (vía compartida a máximo 30 km/h), Desmonte de ciclistas, Vías compartidas peatones-ciclistas."},
      {t:"💡 Tips para el Examen", txt:"Reglamentarias = CIRCULARES (borde rojo). Preventivas = ROMBO (amarillo). Informativas = RECTANGULARES (verde). PARE = octógono. CEDA = triángulo invertido. Si preguntan cómo se clasifican: POR SU FORMA. Línea continua = no cruzar. Segmentada = sí se puede."},
    ]},
  { id:"vehiculo", titulo:"Conoce tu Vehículo", icono:"🔧", color:"#4f46e5", desc:"Panel de instrumentos, frenos, neumáticos, aceite, batería, suspensión y mecánica preventiva", svg:"tablero",
    contenido:[
      {t:"Panel de Instrumentos", txt:"Es el medio de comunicación del vehículo contigo. INDICADORES principales: velocímetro (velocidad), tacómetro/RPM (revoluciones del motor), temperatura del refrigerante, nivel de combustible. TESTIGOS de alerta: aceite (rojo), batería (rojo), ABS (amarillo), airbag, Check Engine, temperatura alta, freno de mano.", svg:"tablero"},
      {t:"Sistema de Frenos", txt:"Existen frenos CONVENCIONALES y frenos ABS (sistema antibloqueo). El ABS evita que las ruedas se bloqueen al frenar de emergencia, permitiendo mantener el control de la dirección. Si el ABS falla, los frenos siguen funcionando pero sin antibloqueo. El LÍQUIDO DE FRENOS es un fluido hidráulico que transmite la presión del pedal a las pastillas/zapatas. Debe revisarse periódicamente."},
      {t:"Neumáticos", txt:"Funciones: frenado, agarre, direccionalidad y amortiguación. La profundidad MÍNIMA legal del dibujo es 1,6 mm (recomendable 3 mm). Revisar PRESIÓN cada 500 km o mínimo una vez al mes, SIEMPRE con neumáticos FRÍOS. Neumáticos desgastados = mayor riesgo de aquaplaning, mayor distancia de frenado, peor agarre en curvas.", svg:"neumatico"},
      {t:"Aceite del Motor", txt:"La LUZ DE ACEITE indica presión insuficiente en el sistema de lubricación. Si se enciende: DETENERSE DE INMEDIATO y verificar el nivel. Conducir sin aceite puede DESTRUIR el motor en pocos minutos. Cambiar aceite y filtro según recomendaciones del fabricante (generalmente cada 5.000-10.000 km). Usar aceites de calidad certificada."},
      {t:"Batería y Sistema Eléctrico", txt:"Una batería descargada dificulta el arranque, especialmente con temperaturas BAJAS (relevante en Aysén). Verificar estado de bornes y conexiones periódicamente. Señales de batería débil: arranque lento, luces tenues, testigo de batería encendido. Vida útil promedio: 3-5 años."},
      {t:"Dirección y Suspensión", txt:"La dirección debe responder con precisión y sin holguras excesivas. La suspensión absorbe las irregularidades del pavimento y mantiene las ruedas en contacto con el suelo. Amortiguadores desgastados = mayor distancia de frenado, pérdida de estabilidad en curvas y con viento lateral, mayor fatiga del conductor."},
      {t:"💡 Tips para el Examen", txt:"Luz de aceite = detenerse inmediatamente. Líquido de frenos = transmite presión. Neumáticos: mínimo 1,6 mm, revisar cada 500 km en frío. ABS = evita bloqueo de ruedas. Si preguntan sobre revisión de neumáticos: siempre EN FRÍO y mensualmente."},
    ]},
  { id:"seguridad", titulo:"Seguridad Pasiva y SRI", icono:"🧒", color:"#f59e0b", desc:"Cinturón de seguridad, airbag, apoyacabezas, sistemas de retención infantil y carrocería", svg:"sri",
    contenido:[
      {t:"Seguridad Activa vs Pasiva", txt:"SEGURIDAD ACTIVA: sistemas que ayudan a EVITAR el siniestro (frenos ABS, control de estabilidad ESP, dirección asistida, luces, neumáticos). SEGURIDAD PASIVA: sistemas que MINIMIZAN las lesiones cuando el siniestro ya ocurrió (cinturón, airbag, apoyacabezas, carrocería deformable, SRI)."},
      {t:"Cinturón de Seguridad", txt:"OBLIGATORIO SIEMPRE para el conductor y TODOS los pasajeros, en asientos delanteros Y traseros. Cada cinturón es INDIVIDUAL (nunca compartir). Reduce hasta un 50% el riesgo de muerte en siniestros frontales y un 25% en volcamientos. Debe quedar ajustado al cuerpo: la banda diagonal sobre el hombro (no el cuello) y la banda horizontal sobre la cadera (no el abdomen).", svg:"cinturon"},
      {t:"Airbag", txt:"Es COMPLEMENTARIO al cinturón, NO lo reemplaza. Se infla en milisegundos para amortiguar el impacto. Sin cinturón ocurre el 'EFECTO REBOTE': el cuerpo impacta contra el airbag con toda su inercia y es rebotado violentamente hacia atrás, causando lesiones graves o fatales. El airbag solo es seguro CON cinturón puesto."},
      {t:"Apoyacabezas", txt:"Previene el 'efecto latigazo' (whiplash) en colisiones por alcance (choque por atrás). Debe estar regulado a la altura correcta: el centro del apoyacabezas debe quedar a la altura de las OREJAS, no de la nuca. La distancia entre la cabeza y el apoyacabezas debe ser MÍNIMA (máximo 4 cm)."},
      {t:"Sistema de Retención Infantil (SRI)", txt:"OBLIGATORIO para niños según peso y edad (Ley 20.904). Debe ser compatible con el vehículo (anclaje ISOFIX o cinturón de 3 puntos) y adecuado al PESO y TALLA del niño. Se instala en los asientos TRASEROS. Tipos: nido/cuco (0-13 kg), silla convertible (9-18 kg), alzador con respaldo (15-36 kg). Los niños menores de 12 años deben ir SIEMPRE atrás.", svg:"sri"},
      {t:"Doble Puntaje en el Examen Real", txt:"Las preguntas sobre alcohol/drogas, velocidad y sistemas de retención infantil/cinturón valen DOBLE puntaje (2 puntos cada una). Hay exactamente 3 de estas preguntas por examen. Si fallas LAS 3, repruebas AUTOMÁTICAMENTE aunque las otras 32 estén correctas. Son los temas más críticos para la seguridad vial."},
      {t:"💡 Tips para el Examen", txt:"Cinturón = SIEMPRE obligatorio para TODOS. Airbag = complementario, necesita cinturón. SRI = compatible con auto + adecuado al niño. Niños menores de 12 = asientos traseros. Estas preguntas son de DOBLE puntaje: estudiarlas a fondo."},
    ]},
  { id:"emergencias", titulo:"Emergencias y Primeros Auxilios", icono:"🚑", color:"#be185d", desc:"Conducta PAS, primeros auxilios, documentación obligatoria y conducción eficiente", svg:"primerAux",
    contenido:[
      {t:"Conducta PAS", txt:"Ante un siniestro de tránsito, aplica la regla PAS: 1) PROTEGER: señalizar la zona con triángulos reflectantes, encender luces de emergencia, apartar a curiosos. 2) ALERTAR: llamar a Carabineros (133), Bomberos (132) o SAMU (131). Informar ubicación, número de heridos y tipo de siniestro. 3) SOCORRER: según tu capacidad, sin mover heridos innecesariamente a menos que haya riesgo vital.", svg:"primerAux"},
      {t:"Primeros Auxilios Básicos", txt:"NO mover a heridos (riesgo de lesión medular). Si la persona está inconsciente pero respira: posición lateral de seguridad. Si hay hemorragia: presionar con paño limpio. Si no respira y no tiene pulso: RCP (solo si sabes). NUNCA dar líquidos a personas inconscientes. Mantener a los heridos abrigados y tranquilos hasta que llegue la ambulancia."},
      {t:"Vehículos de Emergencia", txt:"Ambulancias, bomberos y policía con sirenas y balizas encendidas tienen PREFERENCIA ABSOLUTA. Todo conductor debe desplazarse a la DERECHA y DETENERSE si es necesario para dejar paso libre. No seguir detrás de un vehículo de emergencia aprovechando el espacio que deja. La multa por no ceder el paso es gravísima."},
      {t:"Documentación Obligatoria", txt:"Todo conductor debe portar: Licencia de conducir vigente, Permiso de circulación del año en curso, SOAP (Seguro Obligatorio de Accidentes Personales) vigente, Revisión técnica al día (si el vehículo tiene más de un año). No portar estos documentos es una infracción. El SOAP cubre daños físicos al conductor o terceros."},
      {t:"Conducción Eficiente", txt:"Para ahorrar combustible y reducir emisiones: acelerar suavemente, mantener velocidad constante, anticiparse al tráfico para frenar gradualmente, apagar el motor en detenciones largas (más de 30 segundos), mantener neumáticos con presión correcta, no cargar peso innecesario, cerrar ventanas a alta velocidad."},
      {t:"Qué Hacer si se Pincha un Neumático", txt:"NO frenar bruscamente ni girar el volante. Sujetar firmemente el volante, sacar el pie del acelerador gradualmente, encender luces de emergencia, estacionar fuera de la calzada en un lugar seguro. Colocar triángulos reflectantes. Cambiar el neumático o llamar asistencia."},
      {t:"💡 Tips para el Examen", txt:"PAS = Proteger, Alertar, Socorrer (en ese orden). Emergencias: 131 (SAMU), 132 (Bomberos), 133 (Carabineros). No mover heridos. Vehículos de emergencia = preferencia absoluta, desplazarse a la derecha. Documentos: licencia + permiso + SOAP + revisión técnica."},
    ]},
];

// ── EXAM ALGORITHM (NEXTEO REPLICA) ──────────────────────────────────
function generarExamen() {
  const dobles = PREGUNTAS.filter(q => q.d);
  const normales = PREGUNTAS.filter(q => !q.d);
  const sd = shuffle(dobles).slice(0, 3);
  const sn = shuffle(normales).slice(0, 32);
  return shuffle([...sd, ...sn]);
}

function shuffle(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }
function fmtTime(s) { return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }

function render() {
  const $=document.getElementById('app');
  if (!APP.session) { $.innerHTML = renderLogin(); return; }
  switch(APP.view) {
    case 'inicio': $.innerHTML = renderInicio(); break;
    case 'temarios': $.innerHTML = renderTemarios(); break;
    case 'temarioDetalle': $.innerHTML = renderTemarioDetalle(); break;
    case 'examen': $.innerHTML = renderExamen(); break;
    case 'resultado': $.innerHTML = renderResultado(); break;
    case 'revision': $.innerHTML = renderRevision(); break;
    case 'settings': $.innerHTML = renderSettings(); break;
    default: $.innerHTML = renderInicio();
  }
}

function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const users = getUsers();
  const found = users.find(x => x.username === u && x.password === p);
  if (!found) { document.getElementById('loginErr').textContent = 'Usuario o contraseña incorrectos'; return; }
  APP.session = found;
  setSession(found);
  APP.view = 'inicio';
  render();
}

// ── PROGRESS CALC ────────────────────────────────────────────────────
function calcProgress() {
  const prog = getUserProgress(APP.session.username);
  const totalQ = PREGUNTAS.length;
  const correctas = Object.keys(prog.preguntasCorrectas || {}).length;
  const pct = Math.round((correctas / totalQ) * 100);
  const temasEst = Object.keys(prog.temasEstudiados || {}).length;
  const exams = prog.examenes || [];
  const aprobados = exams.filter(e => e.aprobado).length;
  const errores = prog.erroresPorTema || {};
  const topErrors = Object.entries(errores).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const ultimo = exams.length ? exams[exams.length-1] : null;
  return { totalQ, correctas, pct, temasEst, totalTemas: TEMARIOS.length, exams: exams.length, aprobados, topErrors, ultimo, errores };
}

// ── EXAMEN ───────────────────────────────────────────────────────────
function renderExamen() {
  const q = APP.qs[APP.idx]; if (!q) return '';
  const r = APP.resp[APP.idx];
  const answered = r !== undefined;
  const totalR = Object.keys(APP.resp).length;
  const pct = (totalR / APP.qs.length) * 100;
  const lowTime = APP.timer < 300;
  const t = TEMARIOS.find(x => x.id === q.tema);

  // Nav dots
  let dotsHTML = '';
  if (APP.navOpen) {
    const dots = APP.qs.map((dq, di) => {
      const dr = APP.resp[di];
      let cls = 'dot';
      if (di === APP.idx) cls += ' current';
      else if (dr !== undefined) {
        if (APP.mode !== 'examen') cls += (dr === dq.c ? ' ok' : ' bad');
        else cls += ' answered';
      }
      return `<button class="${cls}" onclick="goQ(${di})">${di+1}${dq.d?'<span class="dot-x2">×2</span>':''}</button>`;
    }).join('');
    dotsHTML = `<div class="dots-grid fade-in">${dots}</div>`;
  }

  // Opciones - en modo examen SIEMPRE se puede cambiar respuesta
  // en modo estudio se bloquea SOLO cuando showExpl es true
  const locked = APP.mode !== 'examen' && APP.showExpl;
  const opts = q.o.map((o, oi) => {
    const letra = String.fromCharCode(65+oi);
    let cls = 'opt';
    if (locked) {
      if (oi === q.c) cls += ' ok';
      else if (r === oi) cls += ' bad';
    } else if (r === oi) cls += ' sel';
    const letterLabel = locked ? (oi===q.c?'✓':(r===oi?'✗':letra)) : letra;
    return `<button class="${cls}" onclick="selectOpt(${oi})" ${locked?'disabled':''}><span class="opt-letter">${letterLabel}</span><span>${o}</span></button>`;
  }).join('');

  // Explicacion
  let explHTML = '';
  if (APP.mode !== 'examen' && APP.showExpl) {
    const ok = r === q.c;
    explHTML = `<div class="expl-box ${ok?'correct':'wrong'} slide-up"><div class="expl-head">${ok?'✅ ¡Correcto!':'❌ Incorrecto'}</div><p class="expl-text">${q.e}</p></div>`;
  }

  // Illustration - use inline SVGs (always available, no external deps)
  let illust = '';
  if (q.svg) {
    illust = `<div class="q-illust">${svgWide(q.svg, 200)}</div>`;
  }

  return `
  <div class="exam-top"><button class="back-btn" onclick="exitExam()">←</button><span class="exam-label">${APP.mode==='estudio'?'💡 Aprendizaje':'📝 Examen'}</span>${APP.mode==='examen'?`<span class="timer-badge${lowTime?' low':''}">${fmtTime(APP.timer)}</span>`:''}</div>
  <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>
  <div class="prog-text">${totalR}/${APP.qs.length}</div>
  <button class="dots-toggle" onclick="toggleNav()">${APP.navOpen?'Ocultar mapa ▲':'Mapa de preguntas ▼'}</button>
  ${dotsHTML}
  <div class="q-box fade-in">
    <div class="q-meta">
      <span class="q-tema" style="background:${t?.color||'#6b7280'}12;color:${t?.color||'#6b7280'}">${t?.icono||''} ${t?.titulo||q.tema}</span>
      ${q.d?'<span class="q-doble">⚡ DOBLE PUNTAJE</span>':''}
    </div>
    ${illust}
    <div class="q-num">Pregunta ${APP.idx+1} de ${APP.qs.length}</div>
    <h3 class="q-text">${q.p}</h3>
    <div class="opts">${opts}</div>
    ${APP.mode==='examen' && r !== undefined && !APP.done ? '<div class="change-hint">💡 Puedes cambiar tu respuesta antes de avanzar</div>' : ''}
    ${explHTML}
  </div>
  <div class="nav-row">
    <button class="nav-btn" onclick="prevQ()" ${APP.idx===0?'disabled':''}>← Anterior</button>
    ${APP.idx===APP.qs.length-1 ? `<button class="nav-btn finish" onclick="finishExam()">Finalizar</button>` : `<button class="nav-btn next" onclick="nextQ()">Siguiente →</button>`}
  </div>`;
}

function renderRevision() {
  const cards = APP.qs.map((q, i) => {
    const r = APP.resp[i];
    const ok = r === q.c;
    const noR = r === undefined;
    const t = TEMARIOS.find(x=>x.id===q.tema);
    const borderColor = noR?'#9ca3af':ok?'#059669':'#dc2626';
    const ill = q.svg ? `<div style="display:flex;justify-content:center;margin:6px 0">${svgWide(q.svg, 160)}</div>` : '';
    const opts = q.o.map((o,oi) => {

      let cls = 'rev-opt'; if(isC) cls+=' ok'; if(isS&&!isC) cls+=' bad';

      return `<div class="${cls}"><span class="rev-letter" style="${lBg}">${isC?'✓':(isS?'✗':l)}</span><span>${o}</span></div>`;
    }).join('');
    return `<div class="rev-card fade-in" style="border-left:4px solid ${borderColor}">
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:8px">

        <div style="display:flex;gap:4px"><span style="font-size:.63rem;font-weight:600;padding:2px 8px;border-radius:5px;background:${t?.color||'#6b7280'}12;color:${t?.color}">${t?.icono} ${t?.titulo}</span>${q.d?'<span style="font-size:.63rem;font-weight:700;padding:2px 8px;border-radius:5px;background:#dc2626;color:#fff">×2</span>':''}</div>

}

// ═══════════════════════════════════════════════════════════════════════
// ACTION HANDLERS
// ═══════════════════════════════════════════════════════════════════════
function goInicio() { clearInterval(APP.timerInterval); APP.view='inicio'; render(); }
function goTemarios() { APP.view='temarios'; render(); }
function goTemarioDetalle(id) { APP.temario = TEMARIOS.find(t=>t.id===id); APP.view='temarioDetalle'; render(); }
function goSettings() { APP.view='settings'; render(); }
function goRevision() { APP.view='revision'; render(); }
function doLogout() { clearSession(); APP.session=null; APP.view='login'; render(); }

function marcarEstudiado(id) {
  const prog = getUserProgress(APP.session.username);
  if (!prog.temasEstudiados) prog.temasEstudiados = {};
  prog.temasEstudiados[id] = true;
  saveUserProgress(APP.session.username, prog);
  goTemarios();
}

function iniciarExamen(mode) {
  clearInterval(APP.timerInterval);
  APP.qs = generarExamen();
  APP.idx = 0; APP.resp = {}; APP.timer = 2700; APP.done = false; APP.mode = mode; APP.navOpen = false; APP.showExpl = false;
  APP.view = 'examen';
  if (mode === 'examen') {
    APP.timerInterval = setInterval(() => {
      APP.timer--;
      if (APP.timer <= 0) { clearInterval(APP.timerInterval); APP.done = true; finishExam(); return; }
      // Update timer display only
      const el = document.querySelector('.timer-badge');
      if (el) { el.textContent = fmtTime(APP.timer); if(APP.timer<300) el.classList.add('low'); }
    }, 1000);
  }
  render();
}

function practicarTema(id) {
  marcarEstudiado(id);
  clearInterval(APP.timerInterval);
  APP.qs = shuffle(PREGUNTAS.filter(q => q.tema === id));
  APP.idx = 0; APP.resp = {}; APP.timer = 2700; APP.done = false; APP.mode = 'estudio'; APP.navOpen = false; APP.showExpl = false;
  APP.view = 'examen';
  render();
}

function iniciarRefuerzo() {
  const prog = getUserProgress(APP.session.username);
  const errores = prog.erroresPorTema || {};
  const sorted = Object.entries(errores).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>e[0]);
  if (!sorted.length) { alert('Realiza un examen primero.'); return; }
  clearInterval(APP.timerInterval);
  APP.qs = shuffle(PREGUNTAS.filter(q => sorted.includes(q.tema)));
  APP.idx = 0; APP.resp = {}; APP.timer = 2700; APP.done = false; APP.mode = 'estudio'; APP.navOpen = false; APP.showExpl = false;
  APP.view = 'examen';
  render();
}

function practicarErrores() {
  const errorIndices = [];
  APP.qs.forEach((q,i) => { if(APP.resp[i] !== q.c) errorIndices.push(q); });
  if (!errorIndices.length) { goInicio(); return; }
  clearInterval(APP.timerInterval);
  APP.qs = shuffle(errorIndices);
  APP.idx = 0; APP.resp = {}; APP.timer = 2700; APP.done = false; APP.mode = 'estudio'; APP.navOpen = false; APP.showExpl = false;
  APP.view = 'examen';
  render();
}

function exitExam() { clearInterval(APP.timerInterval); goInicio(); }
function toggleNav() { APP.navOpen = !APP.navOpen; render(); }
function prevQ() { if(APP.idx>0) { APP.idx--; APP.showExpl=false; render(); } }
function nextQ() { if(APP.idx<APP.qs.length-1) { APP.idx++; APP.showExpl=false; render(); } }
function goQ(i) { APP.idx = i; APP.showExpl = false; APP.navOpen = false; render(); }

function selectOpt(oi) {
  if (APP.done) return;
  // En modo estudio, si ya se mostró la explicación, no permitir cambiar
  if (APP.mode !== 'examen' && APP.showExpl) return;
  // En modo examen: SIEMPRE permitir cambiar respuesta (toggle o cambiar a otra)
  if (APP.resp[APP.idx] === oi) {
    // Click en la misma opción = deseleccionar
    delete APP.resp[APP.idx];
  } else {
    // Seleccionar nueva opción (o cambiar de opción)
    APP.resp[APP.idx] = oi;
  }
  if (APP.mode !== 'examen' && APP.resp[APP.idx] !== undefined) APP.showExpl = true;
  render();
}

function calcExamResult() {
  let correctas=0, puntaje=0, porTema={}, erroresTema={};
  APP.qs.forEach((q,i) => {
    if(!porTema[q.tema]) porTema[q.tema]={c:0,t:0};
    porTema[q.tema].t++;
    if(APP.resp[i]===q.c){correctas++;puntaje+=q.d?2:1;porTema[q.tema].c++;}
    else { if(!erroresTema[q.tema]) erroresTema[q.tema]=[]; erroresTema[q.tema].push(i); }
  });
  // Check: if all 3 double-score wrong = fail
  const doublesWrong = APP.qs.filter((q,i) => q.d && APP.resp[i] !== q.c).length;
  const dobles3fail = APP.qs.filter(q=>q.d).length > 0 && doublesWrong >= 3;
  const aprobado = puntaje >= 33 && !dobles3fail;
  return { correctas, puntaje, porTema, erroresTema, aprobado, dobles3fail };
}

function finishExam() {
  clearInterval(APP.timerInterval);
  APP.done = true;
  // Save progress
  const res = calcExamResult();
  const prog = getUserProgress(APP.session.username);
  if (!prog.examenes) prog.examenes = [];
  prog.examenes.push({
    fecha: new Date().toISOString(),
    puntaje: res.puntaje,
    correctas: res.correctas,
    total: APP.qs.length,
    aprobado: res.aprobado,
  });
  // Track errors
  if (!prog.erroresPorTema) prog.erroresPorTema = {};
  if (!prog.preguntasCorrectas) prog.preguntasCorrectas = {};
  if (!prog.preguntasRespondidas) prog.preguntasRespondidas = {};
  APP.qs.forEach((q,i) => {
    prog.preguntasRespondidas[q.id] = true;
    if (APP.resp[i] === q.c) {
      prog.preguntasCorrectas[q.id] = true;
    } else {
      prog.erroresPorTema[q.tema] = (prog.erroresPorTema[q.tema] || 0) + 1;
      // If previously marked correct but now wrong, remove
      delete prog.preguntasCorrectas[q.id];
    }
  });
  saveUserProgress(APP.session.username, prog);
  APP.view = 'resultado';
  render();
}

// ── USER MANAGEMENT ──────────────────────────────────────────────────
function addUser() {
  const u = document.getElementById('newUser').value.trim();
  const p = document.getElementById('newPass').value;
  const err = document.getElementById('addUserErr');
  if (!u || !p) { err.textContent = 'Completa ambos campos'; return; }
  if (p.length < 4) { err.textContent = 'Contraseña mínimo 4 caracteres'; return; }
  const users = getUsers();
  if (users.find(x => x.username === u)) { err.textContent = 'Usuario ya existe'; return; }
  users.push({ username: u, password: p, role: 'usuario', created: new Date().toISOString() });
  saveUsers(users);
  render();
}

function delUser(i) {
  const users = getUsers();
  if (users[i].username === APP.session.username) return;
  if (!confirm(`¿Eliminar usuario "${users[i].username}"?`)) return;
  users.splice(i, 1);
  saveUsers(users);
  render();
}

function resetProgress() {
  if (!confirm('¿Borrar todo tu progreso? No se puede deshacer.')) return;
  LS.del('ae_prog_' + APP.session.username);
  render();
}

// ── INIT ─────────────────────────────────────────────────────────────
(function init() {
  const s = getSession();
  if (s) {
    // Verify user still exists
    const users = getUsers();
    const found = users.find(u => u.username === s.username && u.password === s.password);
    if (found) { APP.session = found; APP.view = 'inicio'; }
    else { clearSession(); }
  }
  render();
  // Handle Enter on login
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !APP.session) doLogin();
  });
})();
</script>
